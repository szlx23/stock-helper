name: quality-gates

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install development dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run project evaluation
        env:
          PYTHON: python
        run: bash .agent-bench/scripts/run_project_eval.sh
